recipe_version: '1'
model: Intel/Qwen3.5-122B-A10B-int4-AutoRound
runtime: vllm-distributed
builder: eugr
min_nodes: 1
container: vllm-node-tf5
cluster_only: false
metadata:
  description: vLLM serving Qwen3.5-122B-A10B Intel AutoRound INT4 + MTP-2 (optimized for SM121)
build_args:
- --tf5
mods:
- mods/fix-qwen3.5-autoround
- mods/fix-qwen3.5-chat-template
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.90
  max_model_len: 262144
  max_num_batched_tokens: 16384
  max_num_seqs: 4
  speculative_config: '{"method":"mtp","num_speculative_tokens":2}'
env:
  VLLM_MARLIN_USE_ATOMIC_ADD: "1"
command: |
  vllm serve Intel/Qwen3.5-122B-A10B-int4-AutoRound \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --max-num-seqs {max_num_seqs} \
    --port {port} \
    --host {host} \
    --tensor-parallel-size {tensor_parallel} \
    --attention-backend FLASHINFER \
    --speculative-config '{speculative_config}' \
    --load-format fastsafetensors \
    --enable-prefix-caching \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_coder \
    --reasoning-parser qwen3 \
    --chat-template unsloth.jinja \
    --trust-remote-code