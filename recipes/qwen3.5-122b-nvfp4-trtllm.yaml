recipe_version: '1'
model: Sehyo/Qwen3.5-122B-A10B-NVFP4
runtime: trtllm
builder: eugr
min_nodes: 1
container: trtllm-node
cluster_only: false
metadata:
  description: trtllm-serve Qwen3.5-122B-A10B-NVFP4 (Blackwell NVFP4 + MTP-2, optimized)
mods:
- mods/fix-qwen3.5-chat-template
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  expert_parallel: 1
  free_gpu_memory_fraction: 0.90
  max_seq_len: 131072
  max_num_tokens: 16384
  max_batch_size: 4
  num_nextn_predict_layers: 2
  extra_llm_api_options: /workspace/trtllm_extra.yaml
env:
  TRTLLM_ENABLE_PDL: "1"
  TRTLLM_MOE_BACKEND: "TRTLLM"
files:
  /workspace/trtllm_extra.yaml: |
    trust_remote_code: true
    enable_chunked_prefill: true
    kv_cache_config:
      enable_block_reuse: true
      free_gpu_memory_fraction: {free_gpu_memory_fraction}
    speculative_config:
      decoding_type: MTP
      num_nextn_predict_layers: {num_nextn_predict_layers}
    cuda_graph_config:
      max_batch_size: {max_batch_size}
      enable_padding: true
    moe_config:
      backend: TRTLLM
    stream_interval: 1
    tool_call_parser: qwen3_coder
    reasoning_parser: qwen3
    chat_template: unsloth.jinja
command: |
  mpirun -n 1 --allow-run-as-root --oversubscribe \
    trtllm-serve Sehyo/Qwen3.5-122B-A10B-NVFP4 \
      --host {host} \
      --port {port} \
      --backend pytorch \
      --tp_size {tensor_parallel} \
      --ep_size {expert_parallel} \
      --max_batch_size {max_batch_size} \
      --max_num_tokens {max_num_tokens} \
      --max_seq_len {max_seq_len} \
      --kv_cache_free_gpu_memory_fraction {free_gpu_memory_fraction} \
      --extra_llm_api_options {extra_llm_api_options}
